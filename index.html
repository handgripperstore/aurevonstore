<!DOCTYPE html>
<html>
<head>
  <title>Sumith E-com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo.jpg">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 60px 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 300px;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: contain;
    }

    h3 {
      margin: 10px 0 5px;
    }

    .price {
      margin: 10px 0 20px;
    }

    .strike {
      text-decoration: line-through;
      color: #999;
      margin-right: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<header>Mini Store</header>

<div class="container">

  <div class="card">
    <img src="handgripper.jpg">
    <h3>Hand Gripper</h3>
    <div class="price">
      <span class="strike">₹499</span>
      <strong>₹10</strong>
    </div>
    <button onclick="buy('Hand Gripper')">Buy Now</button>
  </div>

  <div class="card">
    <img src="pen.jpg">
    <h3>Premium Pen</h3>
    <div class="price">
      <span class="strike">₹50</span>
      <strong>₹10</strong>
    </div>
    <button onclick="buy('Premium Pen')">Buy Now</button>
  </div>

</div>

<script>
function buy(product) {
  localStorage.setItem("product", product);
  window.location.href = "details.html";
}
</script>

</body>
</html>
