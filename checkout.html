<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<style>

body{
font-family: Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#7b2cff;
color:white;
border:none;
padding:15px 25px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5c1fd8;
}

img{
margin:20px 0;
width:220px;
}

</style>

</head>

<body>

<div class="container">

<h2>Complete Your Payment</h2>

<p>Scan the QR code and pay ₹10</p>

<img src="qr.jpeg">

<input id="payer_name" placeholder="Payer Name">

<input id="phone" placeholder="Phone Number">

<input id="address" placeholder="Shipping Address">

<br><br>

<button onclick="submitOrder()">I Have Completed the Payment</button>

</div>

<script>

async function submitOrder(){

const payerName=document.getElementById("payer_name").value
const phone=document.getElementById("phone").value
const address=document.getElementById("address").value

if(!payerName || !phone || !address){
alert("Please fill all details")
return
}

const res=await fetch("/api/createOrder",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
payer_name:payerName,
phone:phone,
address:address
})
})

const data=await res.json()

if(data.success){

localStorage.setItem("order_code",data.order_code)

window.location.href="/pending.html"

}else{

alert("Error creating order")

}

}

</script>

</body>
</html>
