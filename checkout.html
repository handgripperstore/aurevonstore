<!DOCTYPE html>
<html>
<head>
  <title>Sumith E-com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="icon" href="logo.jpg">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
    }

    .header {
      background: white;
      padding: 18px 0;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .brand img {
      height: 42px;
    }

    .brand span {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: #111827;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 70px 20px;
    }

    .card {
      width: 380px;
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .amount {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .order-id {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .qr img {
      width: 220px;
      border-radius: 12px;
      animation: pop 0.5s ease;
    }

    .instruction {
      font-size: 14px;
      margin-top: 15px;
      color: #374151;
    }

    /* SLIDE BUTTON */
    .slider-container {
      margin-top: 35px;
      position: relative;
      background: #ede9fe;
      border-radius: 50px;
      height: 55px;
      overflow: hidden;
      user-select: none;
    }

    .slider-text {
      position: absolute;
      width: 100%;
      text-align: center;
      line-height: 55px;
      font-weight: 600;
      color: #6d28d9;
    }

    .slider-button {
      width: 55px;
      height: 55px;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      border-radius: 50%;
      position: absolute;
      left: 0;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider-container.success {
      background: #dcfce7;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      from { transform: scale(0.85); }
      to { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <img src="logo.jpg">
    <span>Sumith E-com</span>
  </div>
</div>

<div class="container">
  <div class="card">

    <div class="amount">Pay ₹10</div>
    <div class="order-id" id="orderId"></div>

    <div class="qr">
      <img id="qrCode">
    </div>

    <div class="instruction">
      Scan using PhonePe / GPay / Any UPI App<br>
      Ensure amount is ₹10 exactly.
    </div>

    <div class="slider-container" id="slider">
      <div class="slider-text">Slide to Confirm Payment</div>
      <div class="slider-button" id="sliderBtn">→</div>
    </div>

  </div>
</div>

<script>
const orderId = "SE" + Math.floor(Math.random() * 100000);
document.getElementById("orderId").innerText = "Order ID: " + orderId;

const upiLink = `upi://pay?pa=9177916932@fam&pn=SumithEcom&am=10&cu=INR&tn=${orderId}`;

document.getElementById("qrCode").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(upiLink);

const slider = document.getElementById("slider");
const sliderBtn = document.getElementById("sliderBtn");

let isDragging = false;

sliderBtn.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const sliderRect = slider.getBoundingClientRect();
  let offset = e.clientX - sliderRect.left;

  if (offset < 0) offset = 0;
  if (offset > sliderRect.width - 55) offset = sliderRect.width - 55;

  sliderBtn.style.left = offset + "px";

  if (offset >= sliderRect.width - 60) {
    slider.classList.add("success");
    window.location.href = "success.html";
  }
});
</script>

</body>
</html>
