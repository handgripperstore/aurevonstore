<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0d0d0d;
color:white;
text-align:center;
padding:60px;
}

.container{
background:#141414;
padding:40px;
max-width:500px;
margin:auto;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.logo{
width:150px;
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:6px;
border:none;
background:#1e1e1e;
color:white;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
background:#d4af37;
color:black;
font-weight:600;
cursor:pointer;
margin-top:20px;
}

img.qr{
width:200px;
margin:20px 0;
}

</style>

</head>

<body>

<div class="container">

<img src="aurevon_house.jpg" class="logo">

<h2>Complete Your Payment</h2>

<p>Scan the QR code and pay ₹10</p>

<img src="qr.jpeg" class="qr">

<input id="payer_name" placeholder="Payer Name">

<input id="phone" placeholder="Phone Number">

<input id="address" placeholder="Shipping Address">

<button onclick="submitOrder()">I Have Completed the Payment</button>

</div>

<script>

async function submitOrder(){

const payerName=document.getElementById("payer_name").value
const phone=document.getElementById("phone").value
const address=document.getElementById("address").value

if(!payerName||!phone||!address){
alert("Please fill all details")
return
}

const res=await fetch("/api/createOrder",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
payer_name:payerName,
phone:phone,
address:address
})
})

const data=await res.json()

if(data.success){
localStorage.setItem("order_code",data.order_code)
window.location.href="/pending.html"
}

}

</script>

</body>
</html>
