<!DOCTYPE html>
<html>

<head>

<title>Order Confirmed</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0d0d0d;
font-family:Poppins;
color:white;
text-align:center;
padding:80px;
}

.logo{
width:150px;
}

.order{
font-size:22px;
margin:20px 0;
color:#d4af37;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
background:#d4af37;
color:black;
font-weight:600;
cursor:pointer;
margin:10px;
}

</style>

</head>

<body>

<img src="aurevon_house.jpg" class="logo">

<h1>Payment Confirmed</h1>

<p>Your order has been successfully placed.</p>

<div class="order" id="order_code_display"></div>

<button onclick="track()">Track Order</button>

<button onclick="home()">Return to Home</button>

<script>

const code=localStorage.getItem("order_code")

document.getElementById("order_code_display").innerText="Order Code: "+code

function track(){
window.location.href="/track.html"
}

function home(){
window.location.href="/"
}

</script>

</body>
</html>
